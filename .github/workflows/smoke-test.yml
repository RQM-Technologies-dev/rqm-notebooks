name: Smoke Test

on:
  push:
    branches:
      - "main"
      - "copilot/**"  # Run CI on Copilot agent branches during active development
  pull_request:
    branches: ["main"]

jobs:
  smoke-test:
    name: Smoke Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib nbformat nbconvert pytest

      - name: Install optional RQM / Qiskit dependencies (best-effort)
        continue-on-error: true
        run: |
          pip install qiskit qiskit-aer rqm-core rqm-qiskit

      - name: Run smoke tests
        run: |
          pytest tests/ -v --tb=short

      - name: Validate notebook JSON
        run: |
          python - <<'EOF'
          import pathlib, json, sys
          nb_dir = pathlib.Path("notebooks")
          errors = []
          for nb_path in sorted(nb_dir.glob("*.ipynb")):
              try:
                  with nb_path.open() as f:
                      data = json.load(f)
                  assert data.get("nbformat") == 4, "nbformat != 4"
                  assert len(data.get("cells", [])) > 0, "no cells"
              except Exception as exc:
                  errors.append(f"{nb_path.name}: {exc}")
          if errors:
              print("Notebook validation failures:")
              for e in errors:
                  print(" ", e)
              sys.exit(1)
          print(f"All {len(list(nb_dir.glob('*.ipynb')))} notebooks passed JSON validation.")
          EOF

      - name: Check helpers package imports
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from helpers.plotting import draw_bloch_sphere, plot_counts
          from helpers.notebook_style import setup_notebook, PALETTE
          from helpers.display_utils import show_matrix, show_state_vector
          print('All helpers imported successfully.')
          "
